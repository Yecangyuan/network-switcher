name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check src/

      - name: Syntax check
        run: python -m py_compile src/network_switcher/*.py src/network_switcher/platforms/*.py

      - name: Test import
        run: |
          PYTHONPATH=src python -c "from network_switcher.core import list_interfaces; print('Import OK')"

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Create entry scripts
        run: |
          echo "from network_switcher.cli import main; import sys; sys.exit(main())" > cli_entry.py
          echo "from network_switcher.gui import main; import sys; sys.exit(main())" > gui_entry.py

      - name: Build CLI executable
        run: pyinstaller --onefile --name network-switcher-cli cli_entry.py

      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name network-switcher-gui gui_entry.py

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
