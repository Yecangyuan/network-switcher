name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff
        run: ruff check src/

      - name: Syntax check
        run: |
          python -c "
          import py_compile, pathlib, sys
          files = list(pathlib.Path('src/network_switcher').rglob('*.py'))
          for f in files:
              print(f'Checking {f}...')
              py_compile.compile(f, doraise=True)
          print('All files OK')
          "

      - name: Test import
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from network_switcher.core import list_interfaces
          print('Import OK')
          "

      - name: Run unit tests
        run: |
          python -c "
          import sys, unittest
          sys.path.insert(0, 'src')
          suite = unittest.defaultTestLoader.discover('tests')
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          raise SystemExit(0 if result.wasSuccessful() else 1)
          "

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-windows:
    runs-on: windows-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Create entry scripts
        run: |
          echo "from network_switcher.cli import main; import sys; sys.exit(main())" > cli_entry.py
          echo "from network_switcher.gui import main; import sys; sys.exit(main())" > gui_entry.py

      - name: Build CLI executable
        run: pyinstaller --onefile --name network-switcher-cli cli_entry.py

      - name: Build GUI executable
        run: pyinstaller --onefile --windowed --name network-switcher-gui gui_entry.py

      - name: Upload Windows executables
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
